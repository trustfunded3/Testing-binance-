<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance · wallet view</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card-bg { background-color: #1e2329; background-position: center; background-size: cover; }
        .binance-yellow { color: #f0b90b; }
        .bg-binance-yellow { background-color: #f0b90b; }
        .success-green { color: #0ecb81; }
        .danger-red { color: #f6465d; }
        .tab-active { border-bottom: 3px solid #f0b90b; color: white; font-weight: 800; }
        .sparkline { stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 2s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 select-none">

    <div class="max-w-md mx-auto min-h-screen relative">
        
        <div class="flex justify-between items-center px-4 py-4 text-xs font-medium text-gray-400">
            <div class="flex gap-6">
                <span class="tab-active pb-1 cursor-pointer">Spot</span>
                <span class="cursor-pointer">Funding</span>
                <span class="cursor-pointer">Earn</span>
            </div>
            <div class="flex gap-4">
                <i data-lucide="search" class="w-4 h-4"></i>
                <i data-lucide="scan-line" class="w-4 h-4"></i>
                <i data-lucide="message-square-more" class="w-4 h-4"></i>
            </div>
        </div>

        <header class="flex justify-between items-center px-4 mt-2 mb-6">
            <div class="flex gap-1 bg-[#1e2329] p-1 rounded-lg text-xs">
                <button class="px-5 py-2 text-gray-400 font-bold">Exchange</button>
                <button class="px-5 py-2 bg-[#2b3139] text-white rounded-md shadow-md font-bold">Wallet</button>
            </div>
            <div class="flex gap-4 text-gray-400 items-center">
                <div class="relative">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-[#0b0e11]"></span>
                </div>
                <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center border border-gray-600">
                    <i data-lucide="user" class="w-5 h-5 text-white"></i>
                </div>
            </div>
        </header>

        <section class="px-4 mb-8">
            <div class="flex items-center gap-2 text-gray-400 text-xs mb-1">
                <span>Total Balance (USD)</span>
                <i data-lucide="eye" class="w-4 h-4 cursor-pointer" id="eye-icon"></i>
            </div>
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-bold tracking-tight" id="main-balance">$0.00</h1>
                    <p class="success-green text-[11px] font-bold mt-2 flex items-center gap-1">
                        Today's PNL <span class="ml-1">+$0.00 (+0.00%) </span>
                        <i data-lucide="chevron-right" class="w-3 h-3 text-gray-500"></i>
                    </p>
                </div>
                <button class="bg-binance-yellow text-black px-6 py-2.5 rounded-lg font-black text-sm hover:opacity-90 active:scale-95 transition-all">
                    Add Funds
                </button>
            </div>
        </section>

        <nav class="grid grid-cols-5 gap-2 px-4 mb-8 text-center">
            <div class="flex flex-col items-center gap-2 cursor-pointer">
                <div class="card-bg p-3.5 rounded-2xl bg-[#1e2329]"><i data-lucide="repeat" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-bold">Convert</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer">
                <div class="card-bg p-3.5 rounded-2xl bg-[#1e2329]"><i data-lucide="trending-up" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-bold leading-tight">Simple<br>Earn</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer">
                <div class="card-bg p-3.5 rounded-2xl bg-[#1e2329]"><i data-lucide="users" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-bold">Referral</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer">
                <div class="card-bg p-3.5 rounded-2xl bg-[#1e2329]"><i data-lucide="rocket" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-bold">Launchpool</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer">
                <div class="card-bg p-3.5 rounded-2xl bg-[#1e2329]"><i data-lucide="layout-grid" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-bold">More</span>
            </div>
        </nav>

        <div class="grid grid-cols-2 gap-3 px-4 mb-6">
            <div class="card-bg rounded-2xl border border-gray-800/50 relative overflow-hidden group hover:border-gray-700 transition-all" 
                 style="background-image: url('https://images.unsplash.com/photo-1631603090989-93f9ef6f9d80?q=80&w=2072&auto=format&fit=crop');">
                <div class="bg-black/40 p-4 w-full h-full backdrop-blur-[2px]">
                    <div class="flex items-center gap-2 mb-2">
                        <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg" class="w-5 h-5" />
                        <span class="text-xs font-black text-white">BNB</span>
                    </div>
                    <p class="text-xl font-black leading-none mb-1 text-white" id="bnb-price">667.05</p>
                    <p class="success-green text-[10px] font-black" id="bnb-change">+2.24%</p>
                    <svg class="w-full h-10 mt-3 overflow-visible" viewBox="0 0 100 30">
                        <path class="sparkline" d="M0 25 L 20 22 L 40 28 L 60 15 L 80 18 L 100 5" fill="none" stroke="#0ecb81" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <div class="card-bg rounded-2xl border border-gray-800/50 relative overflow-hidden group hover:border-gray-700 transition-all"
                 style="background-image: url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=2069&auto=format&fit=crop');">
                <div class="bg-black/40 p-4 w-full h-full backdrop-blur-[2px]">
                    <div class="flex items-center gap-2 mb-2">
                        <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" class="w-5 h-5" />
                        <span class="text-xs font-black text-white">BTC</span>
                    </div>
                    <p class="text-xl font-black leading-none mb-1 text-white" id="btc-price">72,300.45</p>
                    <p class="success-green text-[10px] font-black" id="btc-change">+2.48%</p>
                    <svg class="w-full h-10 mt-3 overflow-visible" viewBox="0 0 100 30">
                        <path class="sparkline" d="M0 28 L 30 25 L 50 15 L 70 20 L 100 5" fill="none" stroke="#0ecb81" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 px-4 mb-8">
            <div class="card-bg rounded-2xl border border-gray-800 text-center relative overflow-hidden"
                 style="background-image: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=2070&auto=format&fit=crop');">
                <div class="bg-black/50 p-4 w-full h-full backdrop-blur-[2px]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] text-gray-200 font-black uppercase tracking-widest">Fear & Greed</span>
                        <i data-lucide="info" class="w-3 h-3 text-gray-300"></i>
                    </div>
                    <div class="text-4xl font-black mb-0.5 text-white" id="fng-val">33</div>
                    <span class="text-[10px] font-black text-orange-400 uppercase tracking-tighter" id="fng-label">Fear</span>
                    <div class="mt-3 h-1.5 w-full bg-gray-900/60 rounded-full overflow-hidden">
                        <div class="h-full w-1/3 bg-orange-500 rounded-full transition-all duration-1000"></div>
                    </div>
                </div>
            </div>

            <div class="card-bg rounded-2xl border border-gray-800 flex flex-col justify-between overflow-hidden"
                 style="background-image: url('https://images.unsplash.com/photo-1642790551116-18e150f248e3?q=80&w=2070&auto=format&fit=crop');">
                <div class="bg-black/50 p-4 w-full h-full flex flex-col justify-between backdrop-blur-[2px]">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] text-gray-200 font-black uppercase tracking-widest">Categories</span>
                        <span class="text-[8px] text-gray-300 font-bold italic">24h Vol</span>
                    </div>
                    <div class="flex flex-wrap gap-1.5">
                        <span class="px-2 py-1 rounded bg-[#0ecb81]/20 text-[#0ecb81] text-[8px] font-black border border-[#0ecb81]/40 backdrop-blur-sm">SOLANA</span>
                        <span class="px-2 py-1 rounded bg-black/40 text-gray-200 text-[8px] font-black border border-white/10">MEME</span>
                        <span class="px-2 py-1 rounded bg-black/40 text-gray-200 text-[8px] font-black border border-white/10">DeFi</span>
                        <span class="px-2 py-1 rounded bg-black/40 text-gray-200 text-[8px] font-black border border-white/10">AI</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4 flex gap-8 text-[13px] font-black text-gray-500 border-b border-gray-800/50 mb-4">
            <span class="tab-active pb-3 text-white">Popular</span>
            <span class="pb-3 hover:text-gray-300 cursor-pointer">Hot</span>
            <span class="pb-3 hover:text-gray-300 cursor-pointer">New Listing</span>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto card-bg border-t border-gray-800/50 px-6 py-3 flex justify-between items-center z-50 bg-[#1e2329]">
            <div class="flex flex-col items-center gap-1.5 cursor-pointer">
                <i data-lucide="home" class="w-5 h-5 binance-yellow"></i>
                <span class="text-[10px] font-bold binance-yellow">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Markets</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Trade</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Futures</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Wallets</span>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // 1. Live price update for BNB / BTC
        async function fetchMarket() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","BNBUSDT"]');
                const data = await res.json();
                
                data.forEach(coin => {
                    const isBTC = coin.symbol === "BTCUSDT";
                    const priceId = isBTC ? 'btc-price' : 'bnb-price';
                    const changeId = isBTC ? 'btc-change' : 'bnb-change';
                    
                    const price = parseFloat(coin.lastPrice).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    const change = parseFloat(coin.priceChangePercent).toFixed(2);
                    const isPositive = change >= 0;

                    document.getElementById(priceId).innerText = price;
                    const changeEl = document.getElementById(changeId);
                    changeEl.innerText = (isPositive ? '▲ ' : '▼ ') + Math.abs(change) + '%';
                    changeEl.className = isPositive ? 'success-green text-[10px] font-black' : 'danger-red text-[10px] font-black';
                });
            } catch (e) { console.error("price update failed"); }
        }

        // 2. Eye toggle
        let isHidden = false;
        document.getElementById('eye-icon').addEventListener('click', function() {
            isHidden = !isHidden;
            document.getElementById('main-balance').innerText = isHidden ? "******" : "$0.00";
            this.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // 3. Maintain fixed $0.00 balance
        fetchMarket();
        setInterval(fetchMarket, 8000);
        setInterval(() => {
            if (!isHidden) {
                document.getElementById('main-balance').innerText = "$0.00";
            } else {
                document.getElementById('main-balance').innerText = "******";
            }
        }, 200);
    </script>
</body>
</html>
