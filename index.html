<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance · Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .binance-yellow { color: #f0b90b; }
        .bg-card { background-color: #1e2329; }
        .bg-button { background-color: #2b3139; }
        .tab-active { border-bottom: 3px solid #f0b90b; color: white; font-weight: 800; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 select-none">

    <div class="max-w-md mx-auto min-h-screen relative">
        
        <header class="flex justify-between items-center px-4 pt-6 mb-6">
            <div class="flex gap-1 bg-[#1e2329] p-1 rounded-lg text-xs">
                <button class="px-5 py-2 text-gray-400 font-bold">Exchange</button>
                <button class="px-5 py-2 bg-[#2b3139] text-white rounded-md shadow-md font-bold">Wallet</button>
            </div>
            <div class="flex gap-4 text-gray-400 items-center">
                <i data-lucide="bell" class="w-6 h-6"></i>
                <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center border border-gray-600">
                    <i data-lucide="user" class="w-5 h-5 text-white"></i>
                </div>
            </div>
        </header>

        <div class="px-4 mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold">Wallet Overview</h2>
            <i data-lucide="pie-chart" class="w-6 h-6 binance-yellow"></i>
        </div>

        <section class="px-4 mb-6">
            <div class="bg-card rounded-[32px] p-8 border border-gray-800/50">
                <p class="text-gray-400 text-sm mb-2">Estimated Balance</p>
                <div class="flex items-baseline gap-2">
                    <h1 class="text-4xl font-bold tracking-tight" id="btc-balance">0.00000000</h1>
                    <span class="text-sm font-bold text-gray-400">BTC</span>
                </div>
                <p class="text-gray-400 text-lg mt-1">≈ $0.00</p>
            </div>
        </section>

        <nav class="grid grid-cols-3 gap-3 px-4 mb-8">
            <button class="bg-button py-4 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">Deposit</button>
            <button class="bg-button py-4 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">Withdraw</button>
            <button class="bg-button py-4 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">Transfer</button>
        </nav>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-gray-800/50 px-6 py-3 flex justify-between items-center z-50 bg-[#1e2329]">
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Markets</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Trade</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Futures</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 cursor-pointer">
                <i data-lucide="wallet" class="w-5 h-5 binance-yellow"></i>
                <span class="text-[10px] font-bold binance-yellow">Wallets</span>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
