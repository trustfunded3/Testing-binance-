<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustFunded · Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        .card-bg { background-color: #1e2329; background-position: center; background-size: cover; }
        .binance-yellow { color: #f0b90b; }
        .bg-binance-yellow { background-color: #f0b90b; }
        .success-green { color: #0ecb81; }
        .danger-red { color: #f6465d; }
        .tab-active { border-bottom: 3px solid #f0b90b; color: white; font-weight: 800; }
        .nav-item-active { color: #f0b90b !important; }
        .sparkline { stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 2s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        ::-webkit-scrollbar { display: none; }
        .view-section { display: none; height: calc(100vh - 180px); overflow-y: auto; }
        .view-section.active { display: block; }

        /* --- NEW STYLES FOR THE MODAL & INFINITE LOADER --- */
        /* Modal background (hidden by default) */
        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        /* Container for the image and the loader */
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }
        /* The image itself */
        .modal-image {
            display: block;
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }
        /* The infinite loader overlay */
        .infinite-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 17, 0.9); /* Dark overlay */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            pointer-events: none; /* Allows clicks to pass through if needed, but we want it to stay */
            z-index: 10;
        }
        /* Spinner animation */
        .loader-spinner {
            border: 4px solid rgba(240, 185, 11, 0.3);
            border-top: 4px solid #f0b90b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Loading text */
        .loader-text {
            color: #f0b90b;
            margin-top: 16px;
            font-weight: bold;
            font-size: 14px;
        }
        /* Close button for the modal */
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 20;
        }
        .modal-close:hover {
            color: #f0b90b;
        }
        /* --- END OF NEW STYLES --- */
    </style>
</head>
<body class="pb-24 select-none">

    <div class="max-w-md mx-auto min-h-screen relative">

        <div class="flex justify-between items-center px-4 py-4 text-xs font-medium text-gray-400">
            <div class="flex gap-6">
                <span class="tab-active pb-1 cursor-pointer">Spot</span>
                <span class="cursor-pointer">Funding</span>
                <span class="cursor-pointer">Earn</span>
            </div>
            <div class="flex gap-4">
                <i data-lucide="search" class="w-4 h-4"></i>
                <i data-lucide="scan-line" class="w-4 h-4"></i>
                <i data-lucide="message-square-more" class="w-4 h-4"></i>
            </div>
        </div>

        <header class="flex justify-between items-center px-4 mt-2 mb-6">
            <div class="flex gap-1 bg-[#1e2329] p-1 rounded-lg text-xs">
                <button onclick="showView('home')" id="btn-exchange" class="px-5 py-2 text-white bg-[#2b3139] rounded-md shadow-md font-bold transition-all">Exchange</button>
                <button onclick="showView('wallets')" id="btn-wallet" class="px-5 py-2 text-gray-400 font-bold transition-all">Wallet</button>
            </div>
            <div class="flex gap-4 text-gray-400 items-center">
                <div class="relative">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-[#0b0e11]"></span>
                </div>
                <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center border border-gray-600">
                    <i data-lucide="user" class="w-5 h-5 text-white"></i>
                </div>
            </div>
        </header>

        <main id="view-home" class="view-section active">
            <section class="px-4 mb-8">
                <div class="flex items-center gap-2 text-gray-400 text-xs mb-1">
                    <span>Total Balance (USD)</span>
                    <i data-lucide="eye" class="w-4 h-4 cursor-pointer" id="home-eye-icon" onclick="toggleBalance()"></i>
                </div>
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-bold tracking-tight" id="home-main-balance">$0.00</h1>
                        <p class="success-green text-[11px] font-bold mt-2 flex items-center gap-1">
                            Today's PNL <span class="ml-1">+$0.00 (+0.00%) </span>
                            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-500"></i>
                        </p>
                    </div>
                    <button class="bg-binance-yellow text-black px-6 py-2.5 rounded-lg font-black text-sm active:scale-95 transition-all">Add Funds</button>
                </div>
            </section>

            <nav class="grid grid-cols-5 gap-2 px-4 mb-8 text-center">
                <div class="flex flex-col items-center gap-2 cursor-pointer">
                    <div class="card-bg p-3.5 rounded-2xl"><i data-lucide="repeat" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-bold">Convert</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer">
                    <div class="card-bg p-3.5 rounded-2xl"><i data-lucide="layout-grid" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-bold">More</span>
                </div>
            </nav>

            <div class="grid grid-cols-2 gap-3 px-4 mb-6">
                <div class="card-bg rounded-2xl border border-gray-800/50 relative overflow-hidden h-32" style="background-image: url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=400&auto=format&fit=crop');">
                    <div class="bg-black/60 p-4 w-full h-full backdrop-blur-[1px]">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="component" class="w-4 h-4 text-orange-400"></i>
                            <span class="text-xs font-black">BNB</span>
                        </div>
                        <p class="text-xl font-black mb-1" id="bnb-price">---</p>
                        <p class="success-green text-[10px] font-black" id="bnb-change">+0.00%</p>
                    </div>
                </div>
                <div class="card-bg rounded-2xl border border-gray-800/50 relative overflow-hidden h-32" style="background-image: url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=400&auto=format&fit=crop');">
                    <div class="bg-black/60 p-4 w-full h-full backdrop-blur-[1px]">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="bitcoin" class="w-4 h-4 text-yellow-500"></i>
                            <span class="text-xs font-black">BTC</span>
                        </div>
                        <p class="text-xl font-black mb-1" id="btc-price">---</p>
                        <p class="success-green text-[10px] font-black" id="btc-change">+0.00%</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- The 'Trade' view (original one, which will now also trigger the modal) -->
        <main id="view-trade" class="view-section px-6 flex flex-col items-center justify-center text-center">
            <div class="mb-8">
                <i data-lucide="arrow-left-right" class="w-16 h-16 text-gray-500 transform rotate-90"></i>
            </div>
            <h2 class="text-2xl font-bold mb-3">Spot Trading</h2>
            <p class="text-gray-400 text-sm px-6 mb-10 leading-relaxed">
                Connect your account to start trading crypto pairs.
            </p>
            <!-- This button will now also open the modal -->
            <button onclick="openImageModal()" class="w-full bg-binance-yellow text-black py-3.5 rounded-xl font-bold text-lg active:scale-95 transition-all">
                Start Trading
            </button>
        </main>

        <main id="view-wallets" class="view-section px-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold tracking-tight">Wallet Overview</h2>
                <i data-lucide="pie-chart" class="binance-yellow w-5 h-5"></i>
            </div>

            <div class="card-bg p-6 rounded-3xl border border-gray-800/50 mb-6 shadow-2xl">
                <p class="text-gray-400 text-xs mb-2 font-medium">Estimated Balance</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-bold tracking-tighter" id="wallet-main-val">0.00000000</span>
                    <span class="text-sm font-bold text-gray-400">BTC</span>
                </div>
                <p class="text-gray-500 text-sm mt-1">≈ $0.00</p>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button class="bg-[#2b3139] py-3.5 rounded-2xl font-black text-sm active:scale-95 transition-all">Deposit</button>
                <button class="bg-[#2b3139] py-3.5 rounded-2xl font-black text-sm active:scale-95 transition-all">Withdraw</button>
                <button class="bg-[#2b3139] py-3.5 rounded-2xl font-black text-sm active:scale-95 transition-all">Transfer</button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1e2329] border-t border-gray-800 px-6 py-3 flex justify-between items-center z-50">
            <div onclick="showView('home')" id="nav-home" class="flex flex-col items-center gap-1.5 cursor-pointer nav-item-active">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Markets</span>
            </div>
            <!-- MODIFIED: The Trade nav item now also opens the modal -->
            <div onclick="showView('trade'); openImageModal();" id="nav-trade" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Trade</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Futures</span>
            </div>
            <div onclick="showView('wallets')" id="nav-wallets" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Wallets</span>
            </div>
        </nav>

    </div> <!-- Closing max-w-md div -->

    <!-- NEW: Modal for the image with infinite loader -->
    <div id="imageModal">
        <span class="modal-close" onclick="closeImageModal()">&times;</span>
        <div class="modal-content">
            <!-- YOUR WORKING IMAGE -->
            <img src="https://images.unsplash.com/photo-1773959979637-e7df1bf65df0?q=80&w=912&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D.jpg" alt="Spot Trading" class="modal-image">
            <!-- INFINITE LOADER OVERLAY -->
            <div class="infinite-loader">
                <div class="loader-spinner"></div>
                <div class="loader-text">LOADING...</div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- NEW: Modal control functions ---
        function openImageModal() {
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Optional: Close modal if user clicks outside the image content
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                closeImageModal();
            }
        }
        // --- END OF NEW FUNCTIONS ---

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('[id^="nav-"]').forEach(n => {
                n.classList.remove('nav-item-active');
                n.classList.add('text-gray-500');
            });

            const targetView = document.getElementById('view-' + viewId);
            const targetNav = document.getElementById('nav-' + viewId);
            if(targetView) targetView.classList.add('active');
            if(targetNav) {
                targetNav.classList.add('nav-item-active');
                targetNav.classList.remove('text-gray-500');
            }

            const exBtn = document.getElementById('btn-exchange');
            const waBtn = document.getElementById('btn-wallet');

            if(viewId === 'wallets') {
                waBtn.className = "px-5 py-2 text-white bg-[#2b3139] rounded-md shadow-md font-bold transition-all";
                exBtn.className = "px-5 py-2 text-gray-400 font-bold transition-all";
            } else if (viewId === 'home') {
                exBtn.className = "px-5 py-2 text-white bg-[#2b3139] rounded-md shadow-md font-bold transition-all";
                waBtn.className = "px-5 py-2 text-gray-400 font-bold transition-all";
            } else {
                exBtn.className = "px-5 py-2 text-gray-400 font-bold transition-all";
                waBtn.className = "px-5 py-2 text-gray-400 font-bold transition-all";
            }
        }

        async function fetchMarket() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","BNBUSDT"]');
                const data = await res.json();
                data.forEach(coin => {
                    const isBTC = coin.symbol === "BTCUSDT";
                    const price = parseFloat(coin.lastPrice).toLocaleString(undefined, { minimumFractionDigits: 2 });
                    const change = parseFloat(coin.priceChangePercent).toFixed(2);
                    document.getElementById(isBTC ? 'btc-price' : 'bnb-price').innerText = price;
                    const changeEl = document.getElementById(isBTC ? 'btc-change' : 'bnb-change');
                    changeEl.innerText = (change >= 0 ? '+' : '') + change + '%';
                    changeEl.className = change >= 0 ? 'success-green text-[10px] font-black' : 'danger-red text-[10px] font-black';
                });
            } catch (e) {}
        }

        fetchMarket();
        setInterval(fetchMarket, 8000);
    </script>
</body>
</html>
