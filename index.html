<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e11; color: white; }
        .card-bg { background-color: #1e2329; }
        .binance-yellow { color: #f0b90b; }
        .binance-bg-yellow { background-color: #f0b90b; }
        .success-green { color: #0ecb81; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-md mx-auto min-h-screen p-4 border-x border-gray-900 shadow-2xl">
        
        <header class="flex justify-between items-center mb-6">
            <div class="flex gap-1 bg-[#1e2329] p-1 rounded-lg text-sm font-medium">
                <button class="px-4 py-1.5 text-gray-400">Exchange</button>
                <button class="px-4 py-1.5 bg-[#2b3139] text-white rounded-md shadow-sm">Wallet</button>
            </div>
            <div class="flex gap-5 text-gray-400">
                <i data-lucide="bell" class="w-6 h-6 cursor-pointer hover:text-white"></i>
                <i data-lucide="user" class="w-6 h-6 cursor-pointer hover:text-white"></i>
            </div>
        </header>

        <section class="mb-8">
            <div class="flex items-center gap-2 text-gray-400 text-sm mb-1">
                <span>Total Balance (USD)</span>
                <i data-lucide="eye" class="w-4 h-4 cursor-pointer" id="toggle-eye"></i>
            </div>
            <div class="flex justify-between items-end">
                <h1 class="text-4xl font-bold tracking-tight" id="balance-text">$6,171.57</h1>
                <button class="binance-bg-yellow text-black px-5 py-2 rounded-lg font-bold text-sm hover:opacity-90 transition-opacity">
                    Add Funds
                </button>
            </div>
            <p class="success-green text-xs font-medium mt-2">
                Today's PNL <span class="ml-1">+$100.23 (+1.23%) </span>
                <span class="text-gray-500 ml-1">›</span>
            </p>
        </section>

        <nav class="grid grid-cols-5 gap-2 mb-8 text-center">
            <div class="flex flex-col items-center gap-2 group cursor-pointer">
                <div class="card-bg p-3 rounded-2xl group-hover:bg-[#2b3139] transition-colors">
                    <i data-lucide="repeat" class="binance-yellow w-5 h-5"></i>
                </div>
                <span class="text-[10px] text-gray-400 font-medium">Convert</span>
            </div>
            <div class="flex flex-col items-center gap-2 group cursor-pointer">
                <div class="card-bg p-3 rounded-2xl group-hover:bg-[#2b3139] transition-colors">
                    <i data-lucide="trending-up" class="binance-yellow w-5 h-5"></i>
                </div>
                <span class="text-[10px] text-gray-400 font-medium">Earn</span>
            </div>
            <div class="flex flex-col items-center gap-2 group cursor-pointer">
                <div class="card-bg p-3 rounded-2xl group-hover:bg-[#2b3139] transition-colors">
                    <i data-lucide="users" class="binance-yellow w-5 h-5"></i>
                </div>
                <span class="text-[10px] text-gray-400 font-medium">Referral</span>
            </div>
            <div class="flex flex-col items-center gap-2 group cursor-pointer">
                <div class="card-bg p-3 rounded-2xl group-hover:bg-[#2b3139] transition-colors">
                    <i data-lucide="rocket" class="binance-yellow w-5 h-5"></i>
                </div>
                <span class="text-[10px] text-gray-400 font-medium">Launch</span>
            </div>
            <div class="flex flex-col items-center gap-2 group cursor-pointer">
                <div class="card-bg p-3 rounded-2xl group-hover:bg-[#2b3139] transition-colors">
                    <i data-lucide="layout-grid" class="binance-yellow w-5 h-5"></i>
                </div>
                <span class="text-[10px] text-gray-400 font-medium">More</span>
            </div>
        </nav>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-5 h-5 rounded-full binance-bg-yellow"></div>
                    <span class="text-xs font-bold text-gray-300">BNB</span>
                </div>
                <p class="text-lg font-bold leading-tight" id="bnb-price">Loading...</p>
                <p class="success-green text-[10px] font-bold mt-0.5">▲ 1.65%</p>
            </div>
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-5 h-5 rounded-full bg-[#f7931a]"></div>
                    <span class="text-xs font-bold text-gray-300">BTC</span>
                </div>
                <p class="text-lg font-bold leading-tight" id="btc-price">Loading...</p>
                <p class="success-green text-[10px] font-bold mt-0.5">▲ 2.45%</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50 text-center relative overflow-hidden">
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-2">Fear & Greed</span>
                <div class="text-3xl font-black mb-1" id="fng-value">75</div>
                <span class="text-[10px] font-bold text-green-500 uppercase tracking-tighter" id="fng-label">Greed</span>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-red-500 via-yellow-500 to-green-500 opacity-30"></div>
            </div>
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50 flex flex-wrap justify-center gap-2 items-center">
                <span class="px-2 py-1 rounded-full border border-gray-700 text-[8px] text-gray-400 font-bold">DEFI</span>
                <span class="px-2 py-1 rounded-full border border-gray-700 text-[8px] text-gray-400 font-bold">MEME</span>
                <span class="px-2 py-1 rounded-full border border-green-500/50 bg-green-500/10 text-[8px] success-green font-bold">SOLANA</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Toggle Balance Visibility
        const balanceText = document.getElementById('balance-text');
        const toggleBtn = document.getElementById('toggle-eye');
        let hidden = false;

        toggleBtn.addEventListener('click', () => {
            hidden = !hidden;
            balanceText.innerText = hidden ? "******" : "$6,171.57";
            toggleBtn.setAttribute('data-lucide', hidden ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Fetch Live Prices (Binance API)
        async function updateMarket() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","BNBUSDT"]');
                const data = await response.json();
                
                const btc = data.find(c => c.symbol === "BTCUSDT").price;
                const bnb = data.find(c => c.symbol === "BNBUSDT").price;

                document.getElementById('btc-price').innerText = '$' + parseFloat(btc).toLocaleString(undefined, {maximumFractionDigits: 2});
                document.getElementById('bnb-price').innerText = '$' + parseFloat(bnb).toLocaleString(undefined, {maximumFractionDigits: 2});
            } catch (e) {
                console.log("Price update failed");
            }
        }

        // Fetch Fear & Greed Index
        async function updateSentiment() {
            try {
                const response = await fetch('https://api.alternative.me/fng/');
                const data = await response.json();
                document.getElementById('fng-value').innerText = data.data[0].value;
                document.getElementById('fng-label').innerText = data.data[0].value_classification;
            } catch (e) {
                console.log("Sentiment update failed");
            }
        }

        // Initial Calls
        updateMarket();
        updateSentiment();
        setInterval(updateMarket, 5000); // Update every 5 seconds
    </script>
</body>
</html>
