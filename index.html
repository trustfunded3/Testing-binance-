<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0e11; color: white; -webkit-font-smoothing: antialiased; }
        .card-bg { background-color: #1e2329; }
        .binance-yellow { color: #f0b90b; }
        .binance-bg-yellow { background-color: #f0b90b; }
        .success-green { color: #0ecb81; }
        .tab-active { border-bottom: 2px solid #f0b90b; color: white; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto min-h-screen">
        
        <div class="flex justify-between px-6 py-3 text-xs font-medium text-gray-400">
            <div class="flex gap-4">
                <span class="tab-active pb-1">Spot</span>
                <span>Funding</span>
                <span>Earn</span>
            </div>
            <div class="flex gap-3">
                <i data-lucide="search" class="w-4 h-4"></i>
                <i data-lucide="scan-line" class="w-4 h-4"></i>
                <i data-lucide="message-square-more" class="w-4 h-4"></i>
            </div>
        </div>

        <header class="flex justify-between items-center px-4 mt-2 mb-6">
            <div class="flex gap-1 bg-[#1e2329] p-1 rounded-lg text-xs font-bold">
                <button class="px-4 py-1.5 text-gray-400">Exchange</button>
                <button class="px-4 py-1.5 bg-[#2b3139] text-white rounded-md shadow-sm">Wallet</button>
            </div>
            <div class="flex gap-4 text-gray-400">
                <i data-lucide="bell" class="w-6 h-6"></i>
                <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 text-white"></i>
                </div>
            </div>
        </header>

        <section class="px-4 mb-8">
            <div class="flex items-center gap-2 text-gray-400 text-xs mb-1">
                <span>Total Balance (USD)</span>
                <i data-lucide="eye" class="w-3.5 h-3.5" id="toggle-eye"></i>
            </div>
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-bold tracking-tight" id="balance-text">$6,171.57</h1>
                    <p class="success-green text-xs font-medium mt-2">
                        Today's PNL <span class="ml-1">+$100.23 (+1.23%) </span>
                        <span class="text-gray-500 ml-1">›</span>
                    </p>
                </div>
                <button class="binance-bg-yellow text-black px-5 py-2 rounded-lg font-bold text-sm">
                    Add Funds
                </button>
            </div>
        </section>

        <nav class="grid grid-cols-5 gap-2 px-4 mb-8 text-center">
            <div class="flex flex-col items-center gap-2">
                <div class="card-bg p-3 rounded-2xl"><i data-lucide="repeat" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-medium">Convert</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="card-bg p-3 rounded-2xl"><i data-lucide="trending-up" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-medium">Simple Earn</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="card-bg p-3 rounded-2xl"><i data-lucide="users" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-medium">Referral</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="card-bg p-3 rounded-2xl"><i data-lucide="rocket" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-medium">Launchpool</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="card-bg p-3 rounded-2xl"><i data-lucide="layout-grid" class="binance-yellow w-5 h-5"></i></div>
                <span class="text-[10px] text-gray-400 font-medium">More</span>
            </div>
        </nav>

        <div class="grid grid-cols-2 gap-3 px-4 mb-4">
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50 relative overflow-hidden">
                <div class="flex items-center gap-2 mb-2">
                    <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg" class="w-5 h-5" />
                    <span class="text-xs font-bold text-gray-300">BNB</span>
                </div>
                <p class="text-lg font-bold" id="bnb-price">690.42</p>
                <p class="success-green text-[10px] font-bold">▲ 1.65%</p>
                <svg class="w-full h-8 mt-2 opacity-50" viewBox="0 0 100 30">
                    <path d="M0 25 Q 20 5, 40 20 T 80 10 T 100 15" fill="none" stroke="#0ecb81" stroke-width="2" />
                </svg>
            </div>
            <div class="card-bg p-4 rounded-2xl border border-gray-800/50 relative overflow-hidden">
                <div class="flex items-center gap-2 mb-2">
                    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" class="w-5 h-5" />
                    <span class="text-xs font-bold text-gray-300">BTC</span>
                </div>
                <p class="text-lg font-bold" id="btc-price">96,839.99</p>
                <p class="success-green text-[10px] font-bold">▲ 2.45%</p>
                <svg class="w-full h-8 mt-2 opacity-50" viewBox="0 0 100 30">
                    <path d="M0 20 Q 30 25, 50 10 T 100 5" fill="none" stroke="#0ecb81" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 px-4 mb-4">
            <div class="card-bg p-4 rounded-2xl border border-gray-800 relative overflow-hidden">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] text-gray-400 font-bold">Fear & Greed Index</span>
                    <i data-lucide="info" class="w-3 h-3 text-gray-500"></i>
                </div>
                <div class="flex flex-col items-center my-2">
                    <div class="text-3xl font-black">75</div>
                    <span class="text-[9px] font-bold text-green-500 tracking-tighter uppercase">Greed</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full mt-2">
                    <div class="h-full w-3/4 bg-gradient-to-r from-red-500 via-yellow-500 to-green-500 rounded-full"></div>
                </div>
            </div>

            <div class="card-bg p-4 rounded-2xl border border-gray-800 flex flex-col justify-between">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Categories</span>
                    <span class="text-[10px] text-gray-500 italic">24h Vol</span>
                </div>
                <div class="flex flex-wrap gap-1.5 mt-2">
                    <span class="px-2 py-1 rounded bg-[#0ecb81]/10 text-[#0ecb81] text-[8px] font-bold">SOLANA</span>
                    <span class="px-2 py-1 rounded bg-gray-800 text-gray-400 text-[8px] font-bold">MEME</span>
                    <span class="px-2 py-1 rounded bg-gray-800 text-gray-400 text-[8px] font-bold">DEFI</span>
                </div>
            </div>
        </div>

        <div class="px-4 flex gap-6 text-sm font-bold text-gray-400 border-b border-gray-800/50 mb-4">
            <span class="tab-active pb-2">Popular</span>
            <span class="pb-2">Hot</span>
            <span class="pb-2">New Listing</span>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto card-bg border-t border-gray-800 px-6 py-2 flex justify-between items-center">
            <div class="flex flex-col items-center gap-1">
                <i data-lucide="home" class="w-5 h-5 binance-yellow"></i>
                <span class="text-[10px] binance-yellow">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-500">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span class="text-[10px]">Markets</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-500">
                <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                <span class="text-[10px]">Trade</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-500">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span class="text-[10px]">Futures</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-500">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span class="text-[10px]">Wallets</span>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        async function updateMarket() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","BNBUSDT"]');
                const data = await response.json();
                
                const btc = data.find(c => c.symbol === "BTCUSDT").price;
                const bnb = data.find(c => c.symbol === "BNBUSDT").price;

                document.getElementById('btc-price').innerText = parseFloat(btc).toLocaleString(undefined, {maximumFractionDigits: 2});
                document.getElementById('bnb-price').innerText = parseFloat(bnb).toLocaleString(undefined, {maximumFractionDigits: 2});
            } catch (e) { console.log("Price error"); }
        }

        updateMarket();
        setInterval(updateMarket, 3000);
    </script>
</body>
</html>
