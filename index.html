<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Pro Mode · 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* iPhone 16 Pro Frame Mockup */
        .iphone-frame {
            width: 393px; height: 852px; background: #000; border: 12px solid #222; border-radius: 55px;
            position: relative; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 110px; height: 35px; background: #000; border-radius: 20px; z-index: 100;
        }

        /* Content Area */
        .app-container { height: 100%; background-color: #0b0e11; overflow-y: auto; scrollbar-width: none; position: relative; padding-top: 45px; }
        .app-container::-webkit-scrollbar { display: none; }

        /* Custom Styles */
        .card-bg { background-size: cover; background-position: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(11,14,17,0.4) 0%, rgba(11,14,17,0.85) 100%); z-index: 1; }
        .card-content { position: relative; z-index: 2; }
        
        .binance-yellow { color: #f0b90b; }
        .bg-binance-yellow { background-color: #f0b90b; }
        .success-green { color: #0ecb81; }
        
        .tab-active { border-bottom: 2.5px solid #f0b90b; color: white; font-weight: 700; }
        
        /* Home Indicator */
        .home-indicator {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 130px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>
        <div class="home-indicator"></div>

        <div class="app-container">
            <div class="flex justify-between items-center px-6 py-2 text-[13px] text-gray-400 font-semibold mt-2">
                <div class="flex gap-6">
                    <span class="tab-active pb-1">Spot</span>
                    <span>Funding</span>
                    <span>Earn</span>
                </div>
                <div class="flex gap-4 items-center">
                    <i data-lucide="search" class="w-4.5 h-4.5"></i>
                    <i data-lucide="arrow-left-right" class="w-4.5 h-4.5"></i>
                    <i data-lucide="bell" class="w-4.5 h-4.5"></i>
                    <i data-lucide="user" class="w-4.5 h-4.5"></i>
                </div>
            </div>

            <section class="px-6 mt-6 mb-8">
                <div class="flex items-center gap-2 text-gray-400 text-xs mb-1">
                    <span>Total Balance (USD)</span>
                    <i data-lucide="eye" class="w-3.5 h-3.5 opacity-60"></i>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-4xl font-extrabold tracking-tight" id="main-balance">$0.00</h1>
                        <div class="flex items-center gap-1 mt-2">
                            <span class="success-green text-xs font-bold">Today's PNL +$0.00 (+0.00%)</span>
                            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-600"></i>
                        </div>
                    </div>
                    <button class="bg-binance-yellow text-black px-5 py-2 rounded-lg font-bold text-sm">Add Funds</button>
                </div>
            </section>

            <nav class="grid grid-cols-5 gap-1 px-4 mb-8 text-center">
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-[#1e2329] p-3 rounded-2xl"><i data-lucide="repeat" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-medium">Convert</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-[#1e2329] p-3 rounded-2xl"><i data-lucide="trending-up" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-medium">Simple Earn</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-[#1e2329] p-3 rounded-2xl"><i data-lucide="users" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-medium">Referral</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-[#1e2329] p-3 rounded-2xl"><i data-lucide="rocket" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-medium">Launchpool</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-[#1e2329] p-3 rounded-2xl"><i data-lucide="layout-grid" class="binance-yellow w-5 h-5"></i></div>
                    <span class="text-[10px] text-gray-400 font-medium">More</span>
                </div>
            </nav>

            <div class="grid grid-cols-2 gap-3 px-6 mb-6">
                <div class="card-bg p-4 rounded-2xl h-36" style="background-image: url('https://images.unsplash.com/photo-1773933133981-f475cafd8582?q=80&w=400&auto=format&fit=crop');">
                    <div class="card-overlay"></div>
                    <div class="card-content flex flex-col justify-between h-full">
                        <div class="flex items-center gap-2">
                            <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg" class="w-4 h-4">
                            <span class="text-xs font-bold text-gray-300">BNB</span>
                        </div>
                        <div>
                            <p class="text-lg font-black leading-tight" id="bnb-price">667.05</p>
                            <p class="success-green text-[10px] font-bold">+2.24%</p>
                        </div>
                    </div>
                </div>
                <div class="card-bg p-4 rounded-2xl h-36" style="background-image: url('https://images.unsplash.com/photo-1773932817211-07e6e4a81099?q=80&w=400&auto=format&fit=crop');">
                    <div class="card-overlay"></div>
                    <div class="card-content flex flex-col justify-between h-full">
                        <div class="flex items-center gap-2">
                            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" class="w-4 h-4">
                            <span class="text-xs font-bold text-gray-300">BTC</span>
                        </div>
                        <div>
                            <p class="text-lg font-black leading-tight" id="btc-price">72,300.45</p>
                            <p class="success-green text-[10px] font-bold">+2.48%</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 px-6 mb-8">
                <div class="card-bg p-4 rounded-2xl text-center" style="background-image: url('https://images.unsplash.com/photo-1773932553263-4387555708a5?q=80&w=400&auto=format&fit=crop');">
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <span class="text-[9px] text-gray-400 font-bold uppercase tracking-wider block mb-2">Fear & Greed</span>
                        <div class="text-3xl font-black mb-1">33</div>
                        <span class="text-[10px] font-bold text-orange-500 uppercase">Fear</span>
                    </div>
                </div>
                <div class="card-bg p-4 rounded-2xl" style="background-image: url('https://images.unsplash.com/photo-1773932190071-0001c279a7f3?q=80&w=400&auto=format&fit=crop');">
                    <div class="card-overlay"></div>
                    <div class="card-content flex flex-col justify-between h-full">
                        <span class="text-[9px] text-gray-400 font-bold uppercase tracking-wider block mb-2">Categories</span>
                        <div class="flex flex-wrap gap-1">
                            <span class="bg-[#0ecb81]/20 text-[#0ecb81] text-[8px] px-1.5 py-0.5 rounded font-black">SOLANA</span>
                            <span class="bg-white/10 text-gray-300 text-[8px] px-1.5 py-0.5 rounded font-black">MEME</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-6 flex gap-8 text-[13px] font-bold text-gray-500 border-b border-gray-800/50 mb-4">
                <span class="tab-active pb-2 text-white">Popular</span>
                <span class="pb-2">Hot</span>
                <span class="pb-2">New Listing</span>
            </div>

            <div class="absolute bottom-0 left-0 right-0 bg-[#1e2329]/95 backdrop-blur-md px-6 py-4 flex justify-between items-center border-t border-white/5 pb-8">
                <div class="flex flex-col items-center gap-1">
                    <i data-lucide="home" class="w-5 h-5 binance-yellow"></i>
                    <span class="text-[9px] font-bold binance-yellow">Home</span>
                </div>
                <div class="flex flex-col items-center gap-1 text-gray-500">
                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                    <span class="text-[9px] font-bold">Markets</span>
                </div>
                <div class="flex flex-col items-center gap-1 text-gray-500">
                    <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                    <span class="text-[9px] font-bold">Trade</span>
                </div>
                <div class="flex flex-col items-center gap-1 text-gray-500">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span class="text-[9px] font-bold">Futures</span>
                </div>
                <div class="flex flex-col items-center gap-1 text-gray-500">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    <span class="text-[9px] font-bold">Wallets</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function fetchMarket() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","BNBUSDT"]');
                const data = await res.json();
                data.forEach(coin => {
                    const isBTC = coin.symbol === "BTCUSDT";
                    const priceId = isBTC ? 'btc-price' : 'bnb-price';
                    const price = parseFloat(coin.lastPrice).toLocaleString(undefined, { minimumFractionDigits: 2 });
                    document.getElementById(priceId).innerText = price;
                });
            } catch (e) { /* ignore */ }
        }

        // Lock balance to $0.00
        setInterval(() => {
            document.getElementById('main-balance').innerText = "$0.00";
        }, 100);

        fetchMarket();
        setInterval(fetchMarket, 5000);
    </script>
</body>
</html>
